site_name: Manual da Equipe Dados — Base dos Dados
site_description: Documentação centralizada da equipe dados da Base dos Dados
site_url: https://basedosdados.github.io/manual-equipe-dados/
repo_url: https://github.com/basedosdados/manual-equipe-dados
repo_name: basedosdados/manual-equipe-dados
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  language: pt-BR
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Mudar para modo escuro
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Mudar para modo claro
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.action.edit
    - content.code.copy
    - toc.follow

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search:
      lang: pt

exclude_docs: |
  _templates/

nav:
  - Início: index.md
  - Glossário: glossario.md
  - Onboarding:
    - onboarding/index.md
  - Processos:
    - processos/index.md
    - Como fazer:
      - Revisar um PR: processos/como-fazer/revisar-pr.md
      - Planejar uma sprint: processos/como-fazer/planejar-sprint.md
    - Referência:
      - Escala de pontuação: processos/referencia/escala-de-pontuacao.md
      - Respostas-padrão de suporte: processos/referencia/respostas-padrao-suporte.md
  - Infraestrutura:
    - infraestrutura/index.md
    - BigQuery: infraestrutura/bigquery/index.md
    - Prefect:
      - infraestrutura/prefect/index.md
      - Explicação:
        - Arquitetura do Prefect 3: infraestrutura/prefect/explicacao/arquitetura-prefect-3.md
        - Workers: infraestrutura/prefect/explicacao/workers.md
      - Como fazer:
        - Instalar o servidor Prefect 3: infraestrutura/prefect/como-fazer/instalar-servidor-prefect-3.md
        - Configurar os workers: infraestrutura/prefect/como-fazer/configurar-workers.md
        - Fazer deploy de um flow: infraestrutura/prefect/como-fazer/fazer-deploy-de-flow.md
        - Ajustar recursos de pod: infraestrutura/prefect/como-fazer/ajustar-recursos-de-pod.md
        - Registrar metadados no backend: infraestrutura/prefect/como-fazer/registrar-metadata.md
      - Referência:
        - Recursos dos pods: infraestrutura/prefect/referencia/recursos-pods.md
        - Service accounts: infraestrutura/prefect/referencia/service-accounts.md
    - ADRs:
      - infraestrutura/adr/index.md
      - "ADR-0001 — DBT RPC → CLI": infraestrutura/adr/0001-migracao-dbt-rpc-para-cli.md
      - "ADR-0002 — Pipeline integrada com dev": infraestrutura/adr/0002-pipeline-integrada-com-ambiente-dev.md
      - "ADR-0003 — Manter staging no processo": infraestrutura/adr/0003-manter-staging-no-processo-de-dados.md
      - "ADR-0004 — Migração Prefect 0 → 3": infraestrutura/adr/0004-migracao-prefect-0-para-3.md
  - Pipelines:
    - pipelines/index.md
    - Como fazer:
      - Abrir uma issue: pipelines/como-fazer/abrir-issue.md
      - Abrir um PR: pipelines/como-fazer/abrir-pr.md
    - ADRs:
      - pipelines/adr/index.md
  - Observabilidade:
    - observabilidade/index.md
    - Explicação:
      - Dashboard Central da Equipe Dados: observabilidade/explicacao/dashboard-central-equipe-dados.md
      - Cálculo do status de atualização: observabilidade/explicacao/calculo-status-atualizacao.md
    - Referência:
      - Métricas:
        - observabilidade/referencia/metricas/index.md
        - Panorama de Dados: observabilidade/referencia/metricas/panorama-de-dados.md
        - Atualização: observabilidade/referencia/metricas/atualizacao.md
        - Prefect: observabilidade/referencia/metricas/prefect.md
        - Custos: observabilidade/referencia/metricas/custos.md
      - Auditoria de consultas no BigQuery: observabilidade/referencia/auditoria-consultas-bq.md
  - Governança:
    - governanca/index.md
    - Metadados:
      - governanca/metadados/index.md
      - Subir metadados: governanca/metadados/como-fazer/subir-metadados.md
      - ADRs:
        - governanca/metadados/adr/index.md
        - "ADR-0001 — Manter tabelas de arquitetura no Drive": governanca/metadados/adr/0001-manter-tabelas-arquitetura-no-drive.md
    - Qualidade: governanca/qualidade/index.md
    - Acessos GCP: governanca/acessos-gcp/index.md
    - Custos: governanca/custos/index.md
